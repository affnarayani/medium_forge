name: Delete ChatGPT

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-automation:
    # Ubuntu ki jagah MacOS use kiya kyunki iske IPs kam block hote hain
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      # Mac par alag se xvfb install karne ki zaroorat nahi hoti
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Playwright Browsers
        run: |
          python -m playwright install chromium

      - name: Run Chat History Deletion Script
        env:
          DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
          PLAYWRIGHT_SCREENSHOT_ON_FAILURE: 'on'
        # Mac par bina xvfb-run ke seedhe chalega, aur display size auto-handle hoga
        run: |
          xvfb-run python clear_gpt.py

      - name: Upload Debug Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-screenshots
          path: clear_gpt_error_screenshot.png
          if-no-files-found: ignore